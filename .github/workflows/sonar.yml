name: SonarCloud

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  sonar:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2  # v5
        with:
          dotnet-version: '8.x'

      - name: Setup Java (Sonar scanner requirement)
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9  # v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Cache SonarCloud packages
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4
        with:
          path: ~\.sonar\cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Install sonar scanner and coverage tool
        run: |
          dotnet tool install --global dotnet-sonarscanner
          dotnet tool install --global dotnet-coverage

      - name: Restore
        run: dotnet restore

      - name: Begin Sonar analysis
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: $SONAR_TOKEN
        run: |
          dotnet-sonarscanner begin `
            /k:"PFalkowski_MiniDiagnostics" `
            /o:"pfalkowski" `
            /d:sonar.token="$SONAR_TOKEN" `
            /d:sonar.host.url="https://sonarcloud.io" `
            /d:sonar.cs.vscoveragexml.reportsPaths=coverage.xml `
            /d:sonar.exclusions="**/*.UnitTest/**,**/*Test.cs"

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Collect coverage
        run: dotnet-coverage collect "dotnet test --no-build -c Release" -f xml -o coverage.xml

      - name: End Sonar analysis
        env:
          SONAR_TOKEN: $SONAR_TOKEN
        run: dotnet-sonarscanner end /d:sonar.token="$SONAR_TOKEN"
